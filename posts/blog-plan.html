          第一版目标不是功能复杂，而是先把机器视觉、机械设计、电气控制三个方向的内容入口固定下来。
        </p>

        <h2>后续扩展</h2>
        <p>如果文章数量变多，再考虑增加搜索、标签、案例页和图片资源管理。</p>
